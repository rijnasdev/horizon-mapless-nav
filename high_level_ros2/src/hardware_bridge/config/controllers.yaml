controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    # This controller turns /cmd_vel into wheel speeds
    rover_base_controller:
      type: diff_drive_controller/DiffDriveController

    # This controller publishes the orientation/state of the wheels
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

rover_base_controller:
  ros__parameters:
    # Match the joint names generated by your wheels.xacro template!
    left_wheel_names: ["front_left_joint", "rear_left_joint"]
    right_wheel_names: ["front_right_joint", "rear_right_joint"]

    # Kinematics measurements (Approximate placeholders for now)
    wheel_separation: 0.50  # Distance between left and right wheels (y direction)
    wheel_radius: 0.12      # Matches your radius="0.12" in wheels.xacro!

    # Limits
    max_wheel_velocity: 10.0

    # Topic mapping
    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.03]
    twist_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.03]